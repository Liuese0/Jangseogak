{% extends 'base.html' %}
{% block title %}{{ '회원 수정' if member else '회원 추가' }}{% endblock %}

{% block content %}
<div class="container">
  <div class="admin-layout">
    {% include 'admin/_sidebar.html' %}

    <div class="admin-main">
      <div class="page-header">
        <h1 class="page-header-title">{{ '회원 수정' if member else '새 회원 추가' }}</h1>
      </div>

      <form method="POST" style="max-width: 480px;">
        {% if not member %}
        <div class="form-group">
          <label class="form-label">아이디 (Username) *</label>
          <input type="text" name="username" class="form-input" required placeholder="영문 아이디">
        </div>
        {% endif %}

        <div class="form-group">
          <label class="form-label">이름 *</label>
          <input type="text" name="name" class="form-input" required
                 value="{{ member.name if member else '' }}" placeholder="실명">
        </div>

        <div class="form-group">
          <label class="form-label">
            비밀번호 {{ '(변경 시에만 입력)' if member else '*' }}
          </label>
          <input type="password" name="password" class="form-input"
                 {{ '' if member else 'required' }} placeholder="비밀번호">
        </div>

        <div class="form-group">
          <label class="form-label">권한</label>
          <select name="role" class="form-select">
            <option value="user" {{ 'selected' if not member or member.role == 'user' }}>일반 이용자</option>
            <option value="admin" {{ 'selected' if member and member.role == 'admin' }}>관리자</option>
          </select>
        </div>

        <div style="display: flex; gap: 16px; margin-top: 32px;">
          <button type="submit" class="btn btn-primary">
            {{ '수정 완료' if member else '회원 등록' }} &rarr;
          </button>
          <a href="{{ url_for('admin_members') }}" class="btn btn-ghost">취소</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
